name: Scrape UPSC Govt Jobs

on:
  schedule:
    - cron: "15 2 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run scraper in dry mode"
        required: false
        default: "false"

jobs:
  scrape-upsc:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps

      - name: Run UPSC scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          DEFAULT_UPSC_MASTER_EXAM_ID: ${{ secrets.DEFAULT_UPSC_MASTER_EXAM_ID }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            npm run scrape:upsc:dry -- --limit=3
          else
            npm run scrape:upsc -- --limit=3
          fi
